# Docker Compose: n8n + Claude API + PostgreSQL + Redis
# Configuración optimizada para integración con Claude
# Compatible con volúmenes existentes

version: '3.8'

services:
  # PostgreSQL - Base de datos para n8n (producción)
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8n_password_secure}
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
    volumes:
      # Usa volumen existente o crea uno nuevo
      - ${POSTGRES_VOLUME:-postgres_data}:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-network

  # Redis - Para modo cola (queue) y caché
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ${REDIS_VOLUME:-redis_data}:/data
      # Configuración opcional de Redis
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-network

  # n8n - Instancia principal
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Configuración básica
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Madrid}
      - TZ=${GENERIC_TIMEZONE:-Europe/Madrid}

      # Seguridad
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true

      # Base de datos PostgreSQL
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n_password_secure}

      # Modo cola con Redis (recomendado para workflows con IA)
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_DB=0
      - QUEUE_HEALTH_CHECK_ACTIVE=true

      # API Keys - Claude y otros servicios
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Configuración de ejecución
      - EXECUTIONS_PROCESS=main
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=${EXECUTIONS_DATA_MAX_AGE:-168}

      # Deshabilitar telemetría (opcional)
      - N8N_DIAGNOSTICS_ENABLED=${N8N_DIAGNOSTICS_ENABLED:-false}

    volumes:
      # Volumen principal de n8n (usar existente si lo tienes)
      - ${N8N_VOLUME:-n8n_data}:/home/node/.n8n
      # Carpeta para archivos locales (subidas/descargas)
      - ./n8n-local-files:/files

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - n8n-network

  # Worker de n8n (opcional - escala horizontal)
  # Descomenta para usar modo cola con workers
  # n8n-worker:
  #   image: docker.n8n.io/n8nio/n8n:latest
  #   restart: unless-stopped
  #   command: ["worker", "--concurrency=10"]
  #   environment:
  #     - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
  #     - DB_TYPE=postgresdb
  #     - DB_POSTGRESDB_HOST=postgres
  #     - DB_POSTGRESDB_PORT=5432
  #     - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
  #     - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
  #     - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n_password_secure}
  #     - EXECUTIONS_MODE=queue
  #     - QUEUE_BULL_REDIS_HOST=redis
  #     - QUEUE_BULL_REDIS_PORT=6379
  #     - QUEUE_BULL_REDIS_DB=0
  #     - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Madrid}
  #     - TZ=${GENERIC_TIMEZONE:-Europe/Madrid}
  #   depends_on:
  #     - postgres
  #     - redis
  #   networks:
  #     - n8n-network

volumes:
  # Volumen por defecto (solo se crea si no usas uno existente)
  n8n_data:
  postgres_data:
  redis_data:

networks:
  n8n-network:
    driver: bridge
