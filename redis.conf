# Configuración de Redis para n8n en modo cola
# Guarda como redis.conf en la misma carpeta que docker-compose.yml

# Memoria máxima (ajusta según tu servidor)
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistencia (para no perder datos si reinicia)
appendonly yes
appendfsync everysec

# Guardados periódicos
save 900 1
save 300 10
save 60 10000

# Conexión
bind 0.0.0.0
port 6379

# Seguridad básica (opcional - descomenta si quieres password)
# requirepass tu_password_redis

# Límite de clientes
maxclients 10000

# Logging
loglevel notice